# .github/workflows/refresh.yml
#
# This workflow runs the scraper automatically every week (Monday 6am UTC),
# and also lets you trigger it manually from the GitHub website.
# It commits any updated data back to the repo automatically.

name: Refresh MEP meeting data

on:
  # Run every Monday at 06:00 UTC
  schedule:
    - cron: "0 6 * * 1"

  # Also allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repo
      - name: Check out repository
        uses: actions/checkout@v4

      # 2. Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install the required Python packages
      - name: Install dependencies
        run: |
          pip install requests rapidfuzz

      # 4. Run the scraper
      - name: Run scraper
        run: python scraper.py

      # 5. Commit and push any new/changed data files
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/meetings.json
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "Auto-refresh: $(date -u +'%Y-%m-%d')"
          git push

# .github/workflows/refresh.yml
name: Refresh MEP meeting data

on:
  schedule:
    - cron: "0 6 * * 1"  # elke maandag 06:00 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out repository met token
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml rapidfuzz jq

      # 4. Run scraper en log output
      - name: Run scraper
        run: |
          python scraper.py
          echo "=== Scraper output ==="
          cat data/meetings.json

      # 5. Commit en push alleen als er data is
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/meetings.json
          TOTAL=$(jq '.total_matches' data/meetings.json)
          if [ "$TOTAL" -gt 0 ]; then
            git diff --staged --quiet || git commit -m "Auto-refresh: $(date -u +'%Y-%m-%d')"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/aydandevleesschauwer-stack/mep-defence-tracker.git HEAD:main
          else
            echo "No meetings found, skipping commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

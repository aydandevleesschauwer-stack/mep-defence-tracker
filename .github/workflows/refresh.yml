# .github/workflows/refresh.yml
name: Refresh MEP meeting data

on:
  schedule:
    - cron: "0 6 * * 1"  # elke maandag 6:00 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out repo (zonder credentials overschrijven)
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # Belangrijk: voorkomt overschrijven

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml rapidfuzz

      # 4. Run scraper
      - name: Run scraper
        run: python scraper.py

      # 5. Commit and push updated data
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/meetings.json
          git diff --staged --quiet || git commit -m "Auto-refresh: $(date -u +'%Y-%m-%d')"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/aydandevleesschauwer-stack/mep-defence-tracker.git HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
